name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  firmware:
    name: Firmware (Go)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache-dependency-path: firmware/go.sum

      - name: Build (linux/amd64)
        run: cd firmware && go build ./...

      - name: Vet
        run: cd firmware && go vet ./...

      - name: Test
        run: cd firmware && go test ./...

      - name: Cross-compile (linux/arm64 — RPi Zero 2W)
        run: |
          cd firmware
          GOOS=linux GOARCH=arm64 go build -o /dev/null ./cmd/server

  app:
    name: App (TypeScript)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: app/package-lock.json

      - name: Install dependencies
        run: cd app && npm ci

      - name: Type check
        run: cd app && npx tsc --noEmit
